# PulseOps Backend — Render Deployment Configuration
services:
  - type: web
    name: pulseops-backend
    env: docker
    repo: https://github.com/H4rshalshah/PulseOps
    dockerfilePath: ./backend/Dockerfile
    rootDir: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

      # ── URLs ──────────────────────────────────────────────
      - key: CORS_ORIGIN
        value: https://pulseops-frontend.vercel.app
      - key: FRONTEND_URL
        value: https://pulseops-frontend.vercel.app
      - key: BACKEND_URL
        value: https://pulseops-backend.onrender.com

      # ── Secrets ───────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true

      # ── OAuth: Google (set in Render dashboard) ───────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://pulseops-backend.onrender.com/api/auth/google/callback

      # ── OAuth: GitHub (set in Render dashboard) ───────────
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        value: https://pulseops-backend.onrender.com/api/auth/github/callback

      # ── Database ──────────────────────────────────────────
      - key: MONGO_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

      # ── Email (Resend / SMTP) ─────────────────────────────
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: h4rshal.workspace@gmail.com
